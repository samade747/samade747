<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep corporate dark background -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060A12"/>
      <stop offset="100%" stop-color="#0C1220"/>
    </linearGradient>
    <!-- Name gradient: cyan → electric blue -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="55%"  stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00D4FF"/>
      <stop offset="80%"  stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <!-- Left column accent -->
    <linearGradient id="leftBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Dot grid mask -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
    <!-- Corner fade for dots -->
    <radialGradient id="dotFade" cx="10%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotMaskLeft">
      <rect width="380" height="220" fill="url(#dotFade)"/>
    </mask>
    <radialGradient id="dotFadeR" cx="90%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotMaskRight">
      <rect x="520" y="0" width="380" height="220" fill="url(#dotFadeR)"/>
    </mask>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- Dot grid — left side -->
  <rect width="380" height="220" rx="0" fill="url(#dots)" mask="url(#dotMaskLeft)"/>
  <!-- Dot grid — right side -->
  <rect x="520" width="380" height="220" rx="0" fill="url(#dots)" mask="url(#dotMaskRight)"/>

  <!-- Subtle top border line -->
  <rect x="0" y="0" width="900" height="1" rx="1" fill="url(#accentLine)" opacity="0.5"/>

  <!-- Left vertical accent bar -->
  <rect x="52" y="30" width="2" height="160" rx="1" fill="url(#leftBar)"/>

  <!-- Right vertical accent bar -->
  <rect x="846" y="30" width="2" height="160" rx="1" fill="url(#leftBar)"/>

  <!-- Corner bracket — top left -->
  <rect x="20" y="18" width="22" height="2" rx="1" fill="#00D4FF" opacity="0.5"/>
  <rect x="20" y="18" width="2" height="22" rx="1" fill="#00D4FF" opacity="0.5"/>

  <!-- Corner bracket — top right -->
  <rect x="858" y="18" width="22" height="2" rx="1" fill="#818CF8" opacity="0.5"/>
  <rect x="878" y="18" width="2" height="22" rx="1" fill="#818CF8" opacity="0.5"/>

  <!-- Corner bracket — bottom left -->
  <rect x="20" y="200" width="22" height="2" rx="1" fill="#00D4FF" opacity="0.5"/>
  <rect x="20" y="180" width="2" height="22" rx="1" fill="#00D4FF" opacity="0.5"/>

  <!-- Corner bracket — bottom right -->
  <rect x="858" y="200" width="22" height="2" rx="1" fill="#818CF8" opacity="0.5"/>
  <rect x="878" y="180" width="2" height="22" rx="1" fill="#818CF8" opacity="0.5"/>

  <!-- Eyebrow label -->
  <rect x="370" y="38" width="160" height="18" rx="4" fill="#00D4FF" opacity="0.08"/>
  <text x="450" y="51"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9.5" font-weight="600" fill="#00D4FF" text-anchor="middle"
    letter-spacing="2.5" opacity="0.9">TURING LEAD ENGINEER · PAKISTAN</text>

  <!-- Main name -->
  <text x="450" y="103"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="48" font-weight="700" fill="url(#nameGrad)" text-anchor="middle"
    letter-spacing="-0.5">Abdul Samad</text>

  <!-- Accent divider line under name -->
  <rect x="200" y="114" width="500" height="1.5" rx="1" fill="url(#accentLine)"/>

  <!-- Title -->
  <text x="450" y="140"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="0.3">
    Senior Full-Stack Developer  &amp;  AI Engineer
  </text>

  <!-- Tech pills row -->
  <!-- Pill backgrounds -->
  <rect x="100" y="154" width="56"  height="16" rx="8" fill="#00D4FF" opacity="0.08"/>
  <rect x="163" y="154" width="52"  height="16" rx="8" fill="#00D4FF" opacity="0.08"/>
  <rect x="222" y="154" width="80"  height="16" rx="8" fill="#00D4FF" opacity="0.08"/>
  <rect x="309" y="154" width="54"  height="16" rx="8" fill="#00D4FF" opacity="0.08"/>
  <rect x="370" y="154" width="62"  height="16" rx="8" fill="#00D4FF" opacity="0.08"/>
  <rect x="439" y="154" width="54"  height="16" rx="8" fill="#818CF8" opacity="0.08"/>
  <rect x="500" y="154" width="80"  height="16" rx="8" fill="#818CF8" opacity="0.08"/>
  <rect x="587" y="154" width="60"  height="16" rx="8" fill="#818CF8" opacity="0.08"/>
  <rect x="654" y="154" width="56"  height="16" rx="8" fill="#818CF8" opacity="0.08"/>
  <rect x="717" y="154" width="84"  height="16" rx="8" fill="#818CF8" opacity="0.08"/>
  <!-- Pill text -->
  <text x="128" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle" letter-spacing="0.3">MERN</text>
  <text x="189" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle" letter-spacing="0.3">Next.js</text>
  <text x="262" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle" letter-spacing="0.3">TypeScript</text>
  <text x="336" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle" letter-spacing="0.3">Python</text>
  <text x="401" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#38BDF8" text-anchor="middle" letter-spacing="0.3">FastAPI</text>
  <text x="466" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.3">OpenAI</text>
  <text x="540" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.3">LangChain</text>
  <text x="617" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.3">AI Agents</text>
  <text x="682" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.3">Docker</text>
  <text x="759" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" fill="#A5B4FC" text-anchor="middle" letter-spacing="0.3">AWS · GCP</text>

  <!-- Bottom info row -->
  <text x="450" y="197"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1">
    KARACHI, PAKISTAN  ·  AIAGENTIXZ.COM  ·  AVAILABLE REMOTE WORLDWIDE
  </text>

  <!-- Subtle bottom border -->
  <rect x="0" y="219" width="900" height="1" rx="1" fill="url(#accentLine)" opacity="0.3"/>
</svg>
