<svg width="900" height="90" viewBox="0 0 900 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footBg" x1="0" y1="0" x2="900" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0C1220"/>
      <stop offset="100%" stop-color="#060A12"/>
    </linearGradient>
    <linearGradient id="footLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00D4FF"/>
      <stop offset="75%"  stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="footDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#FFFFFF" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="90" rx="12" fill="url(#footBg)"/>

  <!-- Dot texture -->
  <rect width="900" height="90" fill="url(#footDots)"/>

  <!-- Top accent border -->
  <rect x="0" y="0" width="900" height="1" rx="0" fill="url(#footLine)" opacity="0.6"/>

  <!-- Corner brackets -->
  <rect x="20" y="8"  width="18" height="1.5" rx="1" fill="#00D4FF" opacity="0.4"/>
  <rect x="20" y="8"  width="1.5" height="18" rx="1" fill="#00D4FF" opacity="0.4"/>
  <rect x="862" y="8" width="18" height="1.5" rx="1" fill="#818CF8" opacity="0.4"/>
  <rect x="878.5" y="8" width="1.5" height="18" rx="1" fill="#818CF8" opacity="0.4"/>

  <!-- Divider -->
  <rect x="250" y="42" width="400" height="1" rx="1" fill="url(#footLine)" opacity="0.3"/>

  <!-- Top line -->
  <text x="450" y="34"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="600" fill="#38BDF8" text-anchor="middle" letter-spacing="1.5">
    OPEN TO WORK  ·  REMOTE WORLDWIDE  ·  FREELANCE  ·  FULL-TIME  ·  CONTRACTS
  </text>

  <!-- Bottom line -->
  <text x="450" y="60"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.8">
    Abdul Samad  ·  samad.e747@gmail.com  ·  aiagentixz.com  ·  +92 332 822 2026
  </text>

  <!-- Copyright -->
  <text x="450" y="78"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="#1E293B" text-anchor="middle" letter-spacing="0.5">
    © 2025 Abdul Samad · Senior Full-Stack &amp; AI Developer · Karachi, Pakistan
  </text>
</svg>
